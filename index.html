<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מחולל הנחיות ייצור יומיות</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue-dark:#0f2d5a;--blue-mid:#1a4f8a;--blue-acc:#2176c7;
  --amber:#f59e0b;--green:#15803d;--red:#b91c1c;
  --gray-1:#f8f9fa;--gray-2:#e9ecef;--gray-3:#ced4da;--gray-5:#6c757d;
  --border:1px solid var(--gray-3);--radius:6px;--font:'Heebo',Arial,sans-serif;
}
html,body{font-family:var(--font);background:#fff;color:#1a1a2e}

@media screen{
  .screen-wrapper{display:flex;min-height:100vh;background:#f0f4f8}
  .sidebar{width:280px;flex-shrink:0;background:var(--blue-dark);color:#e2e8f0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
  .sidebar-header{padding:20px 16px 14px;border-bottom:1px solid rgba(255,255,255,0.1)}
  .sidebar-header h1{font-size:15px;font-weight:700;color:#fff;line-height:1.3;margin-bottom:3px}
  .sidebar-header p{font-size:10px;color:#94a3b8;font-weight:300}
  .tab-nav{display:flex;flex-direction:column;padding:10px 10px 0;gap:2px}
  .tab-btn{background:none;border:none;color:#94a3b8;font-family:var(--font);font-size:12px;padding:8px 12px;border-radius:var(--radius);cursor:pointer;text-align:right;transition:all .15s;font-weight:400}
  .tab-btn:hover{background:rgba(255,255,255,0.07);color:#e2e8f0}
  .tab-btn.active{background:var(--blue-acc);color:#fff;font-weight:700}
  .fields-panel{flex:1;padding:12px 12px 8px;overflow-y:auto}
  .field-group{margin-bottom:10px}
  .field-group label{display:block;font-size:10px;color:#94a3b8;margin-bottom:3px;font-weight:500;letter-spacing:.03em}
  .field-group input,.field-group textarea{width:100%;padding:6px 8px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:4px;color:#e2e8f0;font-family:var(--font);font-size:11px;direction:rtl;transition:border-color .15s}
  .field-group input:focus,.field-group textarea:focus{outline:none;border-color:var(--blue-acc);background:rgba(255,255,255,0.1)}
  .field-group textarea{resize:vertical;min-height:44px}
  .section-divider{font-size:9px;font-weight:700;color:var(--blue-acc);letter-spacing:.1em;text-transform:uppercase;padding:8px 0 4px;border-bottom:1px solid rgba(255,255,255,0.08);margin-bottom:8px}
  .sidebar-footer{padding:12px;border-top:1px solid rgba(255,255,255,0.1);display:flex;flex-direction:column;gap:6px}
  .btn-generate{background:var(--blue-acc);color:#fff;border:none;border-radius:var(--radius);padding:10px;font-family:var(--font);font-weight:700;font-size:13px;cursor:pointer;width:100%}
  .btn-generate:hover{background:#1a6bb5}
  .btn-save{background:#0c2340;border:1px solid #2176c7;color:#93c5fd;border-radius:var(--radius);padding:10px;font-family:var(--font);font-weight:700;font-size:13px;cursor:pointer;width:100%}
  .btn-save:hover{background:#1a4f8a;color:#fff}
  .btn-print{background:var(--green);color:#fff;border:none;border-radius:var(--radius);padding:10px;font-family:var(--font);font-weight:700;font-size:13px;cursor:pointer;width:100%}
  .btn-print:hover{background:#166534}
  .btn-img{background:#7c3aed;color:#fff;border:none;border-radius:var(--radius);padding:10px;font-family:var(--font);font-weight:700;font-size:13px;cursor:pointer;width:100%}
  .btn-img:hover{background:#6d28d9}
  .btn-reset{background:none;color:#64748b;border:1px solid rgba(255,255,255,0.1);border-radius:var(--radius);padding:7px;font-family:var(--font);font-size:11px;cursor:pointer;width:100%}
  .btn-reset:hover{color:#e2e8f0}
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:#1a4f8a;color:white;padding:10px 22px;border-radius:20px;font-size:13px;font-family:var(--font);font-weight:500;opacity:0;transition:opacity .3s,transform .3s;z-index:9999;pointer-events:none;white-space:nowrap}
  .main-area{flex:1;padding:24px;display:flex;align-items:flex-start;justify-content:center;overflow-x:auto}
}

/* Mobile */
@media screen and (max-width:768px){
  .screen-wrapper{flex-direction:column;background:#0f2d5a}
  .sidebar{width:100%!important;height:auto!important;position:static!important;overflow-y:visible!important}
  .sidebar-header{padding:14px 16px 10px}
  .tab-nav{flex-direction:row!important;overflow-x:auto;padding:8px 8px 0;gap:4px;scrollbar-width:none}
  .tab-nav::-webkit-scrollbar{display:none}
  .tab-btn{flex-shrink:0;font-size:11px;padding:7px 10px;white-space:nowrap}
  .fields-panel{max-height:280px;overflow-y:auto;padding:10px 12px}
  .sidebar-footer{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:10px 12px}
  .sidebar-footer #last-saved{grid-column:1/-1;text-align:center;font-size:10px;color:#64748b}
  .btn-generate,.btn-save,.btn-print,.btn-img{font-size:12px;padding:9px 6px}
  .btn-reset{grid-column:1/-1;font-size:11px;padding:7px}
  .main-area{padding:12px 8px 24px;justify-content:flex-start;background:#f0f4f8;overflow-x:auto}
  .infographic{width:900px}
}

/* ── Infographic — גודל פלט קבוע 900px ──────────── */
.infographic{width:900px;background:#fff;font-family:var(--font);direction:rtl}

/* דסקטופ — הגדלה ויזואלית בלבד, לא משפיע על פלט */
@media screen and (min-width:769px){
  .infographic-scaler{
    zoom:1.3;
    display:inline-block;
  }
}

/* מובייל — כיווץ לרוחב המסך (JS מחשב את ה-scale) */
@media screen and (max-width:768px){
  .infographic-scaler{
    display:block;
    width:100%;
    overflow:hidden;
  }
  .infographic{
    transform-origin:top right;
  }
}

.ig-header{background:var(--blue-dark);color:#fff;display:flex;justify-content:space-between;align-items:center;padding:10px 16px;margin-bottom:6px}
.ig-header-title{font-size:17px;font-weight:900;letter-spacing:-.3px}
.ig-header-sub{font-size:12px;font-weight:300;opacity:.8;margin-top:1px}
.ig-header-date{font-size:12px;opacity:.75;font-weight:300}
.ig-alert{background:#fffbeb;border:2px solid var(--amber);border-radius:var(--radius);padding:8px 12px;margin-bottom:6px;display:flex;gap:10px;align-items:flex-start}
.ig-alert-icon{font-size:18px;flex-shrink:0;line-height:1}
.ig-alert-title{font-weight:700;font-size:11px;color:#92400e;margin-bottom:2px}
.ig-alert-text{font-size:10px;color:#78350f;line-height:1.4}
.ig-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.ig-card{background:#fff;border:var(--border);border-radius:var(--radius);overflow:hidden}
.ig-card-header{background:var(--blue-mid);color:#fff;font-size:10.5px;font-weight:700;padding:5px 10px;letter-spacing:.02em}
.ig-card-body{padding:8px 10px;font-size:9.5px}
.info-row{display:flex;gap:16px;margin-bottom:6px;flex-wrap:wrap}
.info-item .lbl{color:var(--gray-5);font-size:9px;font-weight:400}
.info-item .val{font-weight:700;font-size:10.5px;color:var(--blue-dark)}
.arrow-row{display:flex;align-items:center;gap:8px;background:var(--gray-1);border-radius:4px;padding:4px 8px;margin-bottom:6px;font-size:9px}
.gssp-badge{background:#d1fae5;border:1px solid #6ee7b7;border-radius:4px;padding:2px 7px;font-weight:700;font-size:9px;color:#065f46}
.arrow-icon{color:var(--blue-mid);font-size:16px;font-weight:700}
.info-box{background:#eff6ff;border:1px solid #bfdbfe;border-radius:4px;padding:6px 8px;margin-bottom:5px;font-size:9px;line-height:1.6}
.info-box .box-title{font-weight:700;font-size:10px;color:var(--blue-dark);margin-bottom:3px}
.info-box .lbl{color:var(--gray-5)}
.warn-strip{background:#fefce8;border:1px solid #fde047;border-radius:4px;padding:4px 8px;font-size:9px;font-weight:700;color:#713f12}
.params-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px}
.param-box{text-align:center;background:var(--gray-1);border:var(--border);border-radius:4px;padding:5px 6px;min-width:56px;flex:1}
.param-box .p-icon{font-size:14px;line-height:1;margin-bottom:2px}
.param-box .p-lbl{font-size:7.5px;color:var(--gray-5)}
.param-box .p-val{font-weight:700;font-size:10px;color:var(--blue-dark)}
.green-box{background:#f0fdf4;border:1px solid #86efac;border-radius:4px;padding:6px 8px;font-size:9px;line-height:1.7}
.green-box .g-title{font-weight:700;font-size:10px;color:var(--green);margin-bottom:3px}
.quality-split{display:grid;grid-template-columns:1fr 1fr}
.quality-split>div:first-child{border-left:var(--border)}
.kv-row{display:flex;justify-content:space-between;align-items:baseline;padding:3px 0;border-bottom:1px solid #f1f5f9;font-size:9.5px}
.kv-row:last-child{border-bottom:none}
.kv-row .k{color:var(--gray-5)}
.kv-row .v{font-weight:700;color:var(--blue-dark)}
.alert-strip{background:#fef2f2;border:1px solid #fca5a5;border-radius:4px;padding:4px 7px;margin-top:5px;font-size:8.5px;font-weight:700;color:var(--red)}
.gauge-wrap{text-align:center;margin-bottom:6px}
.gauge-lbl{font-size:8.5px;color:var(--gray-5);margin-top:2px}
.gauge-val{font-weight:700;color:var(--red)}
.fine-box{background:var(--gray-1);border:var(--border);border-radius:4px;padding:5px 7px;font-size:8.5px;line-height:1.6}
.fine-box .fb-title{font-weight:700;font-size:9.5px;margin-bottom:2px;color:var(--blue-dark)}
.status-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:7px}
.pill{border-radius:20px;padding:3px 10px;font-size:9px;font-weight:700}
.pill-green{background:#f0fdf4;border:1px solid #86efac;color:#166534}
.pill-red{background:#fef2f2;border:1px solid #fca5a5;color:var(--red)}
.columns-title{font-size:9.5px;font-weight:700;color:var(--blue-dark);border-top:var(--border);padding-top:7px;margin-top:4px;margin-bottom:8px}
.columns-row{display:flex;gap:8px;justify-content:space-around}
.col-item{text-align:center}
.col-bar{width:52px;height:40px;border-radius:6px 6px 0 0;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:12px;margin:0 auto}
.col-lbl-box{background:var(--blue-dark);color:#fff;font-size:8px;padding:2px 4px;border-radius:0 0 4px 4px;font-weight:500}
.quality-check-row{display:flex;align-items:center;gap:7px;background:var(--gray-1);border-radius:4px;padding:5px 8px;margin-top:7px;font-size:9px}
.qc-icon{font-size:15px}
.qc-title{font-weight:700;color:var(--blue-dark);font-size:9.5px}
.qc-val{color:var(--gray-5)}

/* Print */
@media print{
  @page{size:A4 landscape;margin:6mm}
  html,body{background:#fff!important;margin:0!important;padding:0!important}
  .screen-wrapper{display:block!important}
  .sidebar{display:none!important}
  .main-area{display:block!important;padding:0!important}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
}
</style>
</head>
<body>
<div class="screen-wrapper">
<div id="toast"></div>

<aside class="sidebar">
  <div class="sidebar-header">
    <h1>🏭 מחולל הנחיות ייצור</h1>
    <p>ערוך שדות ← לחץ הפק ← הדפס</p>
  </div>
  <nav class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('general',this)">📋 כללי</button>
    <button class="tab-btn" onclick="switchTab('gssp',this)">🔵 GSSP הזנה</button>
    <button class="tab-btn" onclick="switchTab('quality',this)">📊 GSSP איכות</button>
    <button class="tab-btn" onclick="switchTab('ssp',this)">🟢 SSP</button>
    <button class="tab-btn" onclick="switchTab('mgmt',this)">⚙️ ניהול</button>
    <button class="tab-btn" onclick="switchTab('labels',this)">🏷️ כותרות</button>
  </nav>
  <div class="fields-panel" id="fields-panel"></div>
  <div class="sidebar-footer">
    <div id="last-saved" style="font-size:10px;color:#64748b;text-align:center;margin-bottom:4px">טוען...</div>
    <button class="btn-generate" onclick="generate()">📊 הפק אינפוגרפיקה</button>
    <button id="btn-save" class="btn-save" onclick="saveToSupabase()">💾 שמור הנחיות</button>
    <button class="btn-print" onclick="window.print()">🖨️ הדפס / שמור PDF</button>
    <button id="btn-img" class="btn-img" onclick="downloadImage()">📸 הורד תמונה לווטסאפ</button>
    <button class="btn-reset" onclick="resetData()">🔄 איפוס לברירת מחדל</button>
  </div>
</aside>

<main class="main-area">
  <div class="infographic-scaler">
    <div class="infographic" id="infographic"></div>
  </div>
</main>
</div>

function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

function switchTab(tab,btn){
  currentTab=tab;
  document.querySelectorAll(".tab-btn").forEach(function(b){b.classList.remove("active")});
  btn.classList.add("active");

}

function renderFields(){
  var isLbl = currentTab==="labels";
  var fields = TABS[currentTab]||[];
  var html="";
  if(isLbl) html+="<div style='font-size:10px;color:#f59e0b;margin-bottom:8px;padding:5px 7px;background:rgba(245,158,11,0.1);border-radius:4px;border:1px solid rgba(245,158,11,0.3)'>✏️ שינויים נשמרים עם לחיצה על 💾</div>";
  fields.forEach(function(f){
    if(f.sec){html+="<div class='section-divider'>"+f.sec+"</div>";return;}
    var src = isLbl ? L : D;
    var val = (src[f.k]||"").toString().replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    var onInp = isLbl ? "L[this.dataset.k]=this.value;liveUpdate()" : "D[this.dataset.k]=this.value;liveUpdate()";
    var borderStyle = isLbl ? "border-color:rgba(245,158,11,0.5)" : "";
    html+="<div class='field-group'><label>"+f.l+"</label>";
    if(f.ml) html+="<textarea data-k='"+f.k+"' oninput='"+onInp+"' style='"+borderStyle+"'>"+val+"</textarea>";
    else html+="<input type='text' data-k='"+f.k+"' value='"+val+"' oninput='"+onInp+"' style='"+borderStyle+"'>";
    html+="</div>";
  });
  document.getElementById("fields-panel").innerHTML=html;
}

function showToast(msg,color){
  var t=document.getElementById("toast");
  if(!t)return;
  t.textContent=msg;t.style.background=color||"#1a4f8a";
  t.style.opacity="1";t.style.transform="translateY(0)";
  setTimeout(function(){t.style.opacity="0";t.style.transform="translateY(10px)";},3000);
}

async function saveToSupabase(){
  document.getElementById("btn-save").textContent="⏳ שומר...";
  try{
    var checkRes=await fetch(SUPA_URL+"/rest/v1/guidelines?id=eq.1",{headers:{"apikey":SUPA_KEY,"Authorization":"Bearer "+SUPA_KEY}});
    if(!checkRes.ok) throw new Error("בדיקה נכשלה");
    var existing=await checkRes.json();
    var body=JSON.stringify({id:1,data:D,labels:L,updated_at:new Date().toISOString()});
    var method=(existing&&existing.length>0)?"PATCH":"POST";
    var url=SUPA_URL+"/rest/v1/guidelines"+(method==="PATCH"?"?id=eq.1":"");
    var saveRes=await fetch(url,{method:method,headers:{"apikey":SUPA_KEY,"Authorization":"Bearer "+SUPA_KEY,"Content-Type":"application/json","Prefer":"return=minimal"},body:body});
    if(!saveRes.ok) throw new Error("שמירה נכשלה: "+saveRes.status);
    var now=new Date();
    var ds=now.toLocaleDateString("he-IL")+" "+now.toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit"});
    document.getElementById("last-saved").textContent="✅ נשמר: "+ds;
    showToast("✅ ההנחיות נשמרו בהצלחה!","#15803d");
  }catch(err){
    showToast("❌ שגיאה בשמירה: "+err.message,"#b91c1c");
    document.getElementById("last-saved").textContent="❌ שגיאת שמירה";
  }
  document.getElementById("btn-save").textContent="💾 שמור הנחיות";
}

async function loadFromSupabase(){
  try{
    var res=await fetch(SUPA_URL+"/rest/v1/guidelines?id=eq.1&select=data,labels,updated_at",{headers:{"apikey":SUPA_KEY,"Authorization":"Bearer "+SUPA_KEY}});
    if(!res.ok) throw new Error("שגיאת שרת");
    var rows=await res.json();
    if(rows&&rows.length>0&&rows[0].data){
      D=Object.assign({},DEF,rows[0].data);
      if(rows[0].labels) L=Object.assign({},DEF_LABELS,rows[0].labels);
      var ts=new Date(rows[0].updated_at);
      var ds=ts.toLocaleDateString("he-IL")+" "+ts.toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit"});
      document.getElementById("last-saved").textContent="עדכון אחרון: "+ds;
      showToast("📥 נטענו ההנחיות האחרונות","#15803d");
    }else{
      document.getElementById("last-saved").textContent="ברירת מחדל";
    }
  }catch(err){
    document.getElementById("last-saved").textContent="ברירת מחדל (אין חיבור)";
  }
  renderFields();
  generate();
}

// ── Download Image ────────────────────────────────
async function downloadImage(){
  var btn=document.getElementById("btn-img");
  btn.textContent="⏳ מייצר תמונה...";
  btn.disabled=true;
  try{
    var el=document.getElementById("infographic");
    var prevW=el.style.width,prevMW=el.style.minWidth;
    // אפס zoom/transform זמנית לצילום נקי
    var scaler=el.parentElement;
    var prevZoom=scaler.style.zoom||"";
    var prevTransform=el.style.transform||"";
    var prevMargin=el.style.marginBottom||"";
    scaler.style.zoom="1";
    el.style.transform="none";
    el.style.marginBottom="0";
    el.style.width="900px";el.style.minWidth="900px";
    await new Promise(function(r){setTimeout(r,150);});
    var canvas=await html2canvas(el,{
      scale:2,useCORS:true,allowTaint:true,
      backgroundColor:"#ffffff",logging:false,
      imageTimeout:0,removeContainer:true,
      foreignObjectRendering:false,
      scrollX:-window.scrollX,scrollY:-window.scrollY,
      windowWidth:900,width:900,height:el.scrollHeight
    });
    el.style.width=prevW;el.style.minWidth=prevMW;
    scaler.style.zoom=prevZoom;
    el.style.transform=prevTransform;
    el.style.marginBottom=prevMargin;
    setMobileScale();
    var link=document.createElement("a");
    var ds=(D.date||"הנחיות").replace(/\s/g,"-");
    link.download="הנחיות-ייצור-"+ds+".png";
    link.href=canvas.toDataURL("image/png");
    document.body.appendChild(link);link.click();document.body.removeChild(link);
    showToast("✅ התמונה הורדה! שלח בווטסאפ 📲","#7c3aed");
  }catch(err){
    showToast("❌ שגיאה: "+err.message,"#b91c1c");
  }
  btn.textContent="📸 הורד תמונה לווטסאפ";
  btn.disabled=false;
}

// ── Mobile scale ─────────────────────────────────
function setMobileScale(){
  if(window.innerWidth<=768){
    var scale=window.innerWidth/900;
    document.querySelector(".infographic").style.transform="scale("+scale+")";
    document.querySelector(".infographic").style.marginBottom=((scale-1)*100)+"%";
  } else {
    var el=document.querySelector(".infographic");
    if(el){el.style.transform="";el.style.marginBottom="";}
  }
}
window.addEventListener("resize",setMobileScale);
setMobileScale();

// ── Init ──────────────────────────────────────────
renderFields();
generate();
loadFromSupabase();
</script>
